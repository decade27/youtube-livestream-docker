services:
  youtube-stream:
    build:
      context: .
    image: youtube-livestream-docker:latest
    container_name: youtube_stream
    restart: unless-stopped
    volumes:
      - ./audio:/app/audio
      - ./video:/app/video
    environment:
      YOUTUBE_KEY: ${YOUTUBE_KEY:-YOUR_YOUTUBE_STREAM_KEY}
      YOUTUBE_URL: ${YOUTUBE_URL:-rtmp://a.rtmp.youtube.com/live2}
      FFMPEG_LOGLEVEL: ${FFMPEG_LOGLEVEL:-info}
      FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
      VIDEO_MAXRATE: ${VIDEO_MAXRATE:-6000k}
      VIDEO_BUFSIZE: ${VIDEO_BUFSIZE:-12000k}
      VIDEO_GOP: ${VIDEO_GOP:-60}
      AUDIO_BITRATE: ${AUDIO_BITRATE:-192k}
      AUDIO_SAMPLE_RATE: ${AUDIO_SAMPLE_RATE:-44100}
      AUDIO_CHANNELS: ${AUDIO_CHANNELS:-2}
